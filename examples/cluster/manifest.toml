# multi-node cluster deployment
#
# this manifest works with a yoq cluster. deploy with:
#   yoq up --server 10.0.0.1:7700 -f examples/cluster/manifest.toml
#
# the scheduler places containers across nodes. services discover each
# other by name — networking works transparently across nodes via wireguard.

[service.postgres]
image = "postgres:16"
env = ["POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}", "POSTGRES_DB=app"]
volumes = ["pgdata:/var/lib/postgresql/data"]
restart = "always"

[service.postgres.health_check]
type = "tcp"
port = 5432
interval = 5
timeout = 3

[service.api]
image = "myapp:latest"
ports = ["8000:8000"]
depends_on = ["postgres"]
env = ["DATABASE_URL=postgres://postgres:${DB_PASSWORD:-changeme}@postgres:5432/app"]
restart = "on_failure"

[service.api.health_check]
type = "http"
path = "/health"
port = 8000
interval = 10
timeout = 5
retries = 3
start_period = 15

[service.web]
image = "nginx:latest"
ports = ["443:443", "80:80"]
depends_on = ["api"]
restart = "always"

[service.web.tls]
domain = "myapp.example.com"
acme = true
email = "ops@example.com"

[cron.backup]
image = "postgres:16"
command = ["pg_dump", "-h", "postgres", "-U", "postgres", "-d", "app", "-f", "/backups/dump.sql"]
every = "1h"
env = ["PGPASSWORD=${DB_PASSWORD:-changeme}"]
volumes = ["backups:/backups"]

[volume.pgdata]

[volume.backups]
