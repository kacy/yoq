name: quality

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 13 * * 1-5"

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-test:
    name: full-test
    uses: ./.github/workflows/_build-test.yml
    with:
      job-name: full-test
      command: YOQ_SKIP_SLOW_TESTS=1 zig build test
      timeout-minutes: 45
      failure-artifact-name: quality-full-test-log

  operator-smoke:
    name: operator-smoke
    uses: ./.github/workflows/_build-test.yml
    with:
      job-name: operator-smoke
      command: YOQ_SKIP_SLOW_TESTS=1 zig build test-operator -Doptimize=ReleaseSafe
      timeout-minutes: 30
      failure-artifact-name: quality-operator-smoke-log

  network-smoke:
    name: network-smoke
    uses: ./.github/workflows/_build-test.yml
    with:
      job-name: network-smoke
      command: YOQ_SKIP_SLOW_TESTS=1 zig build test-network -Doptimize=ReleaseSafe
      timeout-minutes: 30
      failure-artifact-name: quality-network-smoke-log

  perf-smoke:
    name: perf-smoke
    uses: ./.github/workflows/_build-test.yml
    with:
      job-name: perf-smoke
      command: YOQ_SKIP_SLOW_TESTS=1 zig build test-perf-smoke -Doptimize=ReleaseSafe
      timeout-minutes: 20
      failure-artifact-name: quality-perf-smoke-log

  hardening-smoke:
    name: hardening-smoke
    uses: ./.github/workflows/_build-test.yml
    with:
      job-name: hardening-smoke
      command: bash tools/panic_audit.sh && YOQ_SKIP_SLOW_TESTS=1 zig build test-hardening -Doptimize=ReleaseSafe
      timeout-minutes: 45
      failure-artifact-name: quality-hardening-smoke-log

  release-build-smoke:
    name: release-build-smoke
    uses: ./.github/workflows/_build-test.yml
    with:
      job-name: release-build-smoke
      command: zig build -Doptimize=ReleaseSafe
      timeout-minutes: 30
      failure-artifact-name: release-build-smoke-log
      upload-path: zig-out/bin/yoq
      upload-artifact-name: yoq-release-smoke-linux-amd64

  dependency-drift:
    name: dependency-drift
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up zig
        uses: ./.github/actions/setup-zig
        with:
          cache-prefix: zig-drift

      - name: rebuild from a clean workspace cache
        shell: bash
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/dependency-drift.log"
          {
            export ZIG_GLOBAL_CACHE_DIR="$RUNNER_TEMP/zig-global-cache-drift"
            export ZIG_LOCAL_CACHE_DIR="$RUNNER_TEMP/zig-local-cache-drift"
            echo "zig path: $(command -v zig)"
            zig version
            rm -rf "$ZIG_GLOBAL_CACHE_DIR" "$ZIG_LOCAL_CACHE_DIR" .zig-cache zig-out
            mkdir -p "$ZIG_GLOBAL_CACHE_DIR/tmp" "$ZIG_LOCAL_CACHE_DIR/tmp"
            zig build
            rm -rf "$ZIG_GLOBAL_CACHE_DIR" "$ZIG_LOCAL_CACHE_DIR" .zig-cache zig-out
            mkdir -p "$ZIG_GLOBAL_CACHE_DIR/tmp" "$ZIG_LOCAL_CACHE_DIR/tmp"
            zig build -Doptimize=ReleaseSafe
          } 2>&1 | tee "$log"

      - name: upload dependency drift log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-drift-log
          path: ${{ runner.temp }}/dependency-drift.log
          retention-days: 7

  docs-packaging-smoke:
    name: docs-packaging-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up zig
        uses: ./.github/actions/setup-zig

      - name: build yoq
        shell: bash
        run: zig build

      - name: verify documented cli entry points
        shell: bash
        run: |
          ./zig-out/bin/yoq version
          ./zig-out/bin/yoq help > /dev/null
          for manifest in examples/*/manifest.toml; do
            ./zig-out/bin/yoq validate -f "$manifest" -q
          done

      - name: verify Docker packaging
        shell: bash
        run: docker build --tag yoq-quality:${{ github.sha }} .
