name: runtime-validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1"

permissions:
  contents: read

concurrency:
  group: runtime-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container-runtime-smoke:
    name: container-runtime-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up zig
        uses: ./.github/actions/setup-zig
        with:
          cache-prefix: zig-runtime

      - name: build yoq
        shell: bash
        run: zig build

      - name: run safe cli smoke checks
        shell: bash
        run: |
          ./zig-out/bin/yoq version
          ./zig-out/bin/yoq help > /dev/null
          bash -n scripts/http-routing-recovery-smoke.sh
          ./zig-out/bin/yoq validate -f examples/redis/manifest.toml
          ./zig-out/bin/yoq validate -f examples/web-app/manifest.toml
          ./zig-out/bin/yoq validate -f examples/cron/manifest.toml
          ./zig-out/bin/yoq validate -f examples/http-routing/manifest.toml
          ./zig-out/bin/yoq validate -f examples/cluster/manifest.toml

  linux-feature-probe:
    name: linux-feature-probe
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: collect host feature report
        shell: bash
        run: |
          report="$RUNNER_TEMP/linux-feature-report.txt"
          {
            echo "# yoq runtime probe"
            echo
            echo "## kernel"
            uname -a
            echo
            echo "## os-release"
            cat /etc/os-release
            echo
            echo "## cgroup"
            mount | grep cgroup || true
            echo
            echo "## namespace tools"
            command -v unshare || true
            command -v nsenter || true
            echo
            echo "## bpf tools"
            command -v bpftool || true
            command -v clang || true
            echo
            echo "## sysctls"
            sysctl kernel.unprivileged_userns_clone || true
            sysctl user.max_user_namespaces || true
          } > "$report"

      - name: upload runtime probe
        uses: actions/upload-artifact@v4
        with:
          name: linux-feature-probe
          path: ${{ runner.temp }}/linux-feature-report.txt
          retention-days: 7

  privileged-runtime:
    name: privileged-runtime-${{ matrix.lane }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: core
            command: test-runtime-core
          - lane: network
            command: test-runtime-network
          - lane: cluster
            command: test-runtime-cluster
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up zig
        uses: ./.github/actions/setup-zig
        with:
          cache-prefix: zig-runtime-${{ matrix.lane }}

      - name: build yoq
        shell: bash
        run: zig build -Doptimize=ReleaseSafe

      - name: run privileged runtime lane
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/runtime-logs"
          set +e
          sudo env YOQ_SKIP_SLOW_TESTS=1 zig build -Doptimize=ReleaseSafe -Drun-privileged-tests=true "${{ matrix.command }}" 2>&1 \
            | tee "$RUNNER_TEMP/runtime-logs/${{ matrix.command }}.log"
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: upload privileged runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: privileged-runtime-${{ matrix.lane }}-logs
          path: ${{ runner.temp }}/runtime-logs/
          retention-days: 7

  manual-bpf-runtime-check:
    name: manual-bpf-runtime-check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up zig
        uses: ./.github/actions/setup-zig
        with:
          cache-prefix: zig-runtime-bpf

      - name: install clang
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang llvm

      - name: compile bpf assets
        shell: bash
        run: zig build bpf

      - name: record generated bpf diff
        shell: bash
        run: |
          git diff -- src/network/bpf > "$RUNNER_TEMP/runtime-bpf-diff.patch" || true
          git status --porcelain -- src/network/bpf >> "$RUNNER_TEMP/runtime-bpf-diff.patch"

      - name: upload bpf runtime diff
        uses: actions/upload-artifact@v4
        with:
          name: runtime-bpf-diff
          path: ${{ runner.temp }}/runtime-bpf-diff.patch
          retention-days: 7
