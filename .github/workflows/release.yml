name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: version tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: resolve tag
        id: tag
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_VERSION}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  fmt-check:
    name: fmt-check
    needs:
      - validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up zig
        uses: ./.github/actions/setup-zig
        with:
          cache-prefix: zig-release

      - name: verify formatting
        shell: bash
        run: zig fmt --check src/ tools/ build.zig

  build-debug:
    name: build-debug
    needs:
      - validate-tag
    uses: ./.github/workflows/_build-test.yml
    with:
      job-name: build-debug
      command: zig build
      failure-artifact-name: release-build-debug-log

  docker-build:
    name: docker-build
    needs:
      - validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: build Docker image
        shell: bash
        run: docker build --tag yoq-release:${{ needs.validate-tag.outputs.tag }} .

  examples-validate:
    name: examples-validate
    needs:
      - validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up zig
        uses: ./.github/actions/setup-zig
        with:
          cache-prefix: zig-release

      - name: build yoq
        shell: bash
        run: zig build

      - name: validate example manifests
        shell: bash
        run: |
          for manifest in examples/*/manifest.toml; do
            ./zig-out/bin/yoq validate -f "$manifest"
          done

  release-build:
    name: release-build-${{ matrix.arch }}
    needs:
      - validate-tag
      - fmt-check
      - build-debug
      - docker-build
      - examples-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-linux
          - arch: arm64
            target: aarch64-linux
          - arch: riscv64
            target: riscv64-linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up zig
        uses: ./.github/actions/setup-zig
        with:
          cache-prefix: zig-release-${{ matrix.arch }}

      - name: build release binary
        shell: bash
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: yoq-release-linux-${{ matrix.arch }}-raw
          path: zig-out/bin/yoq
          retention-days: 7

  package:
    name: package
    needs:
      - validate-tag
      - release-build
    runs-on: ubuntu-latest
    steps:
      - name: download all release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: yoq-release-linux-*-raw
          path: dist/raw

      - name: package release artifacts
        id: package
        shell: bash
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          mkdir -p dist/out
          for dir in dist/raw/yoq-release-linux-*-raw; do
            arch=$(echo "$dir" | sed 's/.*linux-\(.*\)-raw/\1/')
            archive_name="yoq-linux-${arch}-${TAG}.tar.gz"
            checksum_name="yoq-linux-${arch}-${TAG}.sha256"

            chmod +x "${dir}/yoq"
            tar -C "${dir}" -czf "dist/out/${archive_name}" yoq
            (cd dist/out && sha256sum "${archive_name}" > "${checksum_name}")
          done

      - name: upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yoq-release-bundle
          path: dist/out/*
          retention-days: 14

  publish-release:
    name: publish-release
    needs:
      - validate-tag
      - package
    runs-on: ubuntu-latest
    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: yoq-release-bundle
          path: dist

      - name: write release notes
        shell: bash
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          notes="dist/release-notes.md"
          {
            echo "## yoq ${VERSION}"
            echo
            echo "release tag: ${TAG}"
            echo
            echo "artifacts:"
            for f in dist/yoq-linux-*.tar.gz; do
              echo "- $(basename "$f")"
            done
            echo
            echo "install: \`curl -fsSL https://raw.githubusercontent.com/kacy/yoq/main/scripts/install.sh | sh\`"
            echo
            echo "## changelog"
            if [ -f CHANGELOG.md ]; then
              awk -v ver="${VERSION}" '
                $0 == "## " ver { printing = 1; next }
                printing && /^## / { exit }
                printing { print }
              ' CHANGELOG.md
            else
              echo "CHANGELOG.md not found."
            fi
          } > "$notes"

      - name: publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: yoq ${{ needs.validate-tag.outputs.tag }}
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
